<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SENTOX PRO</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fa;
  text-align: center;
}

.container {
  background: white;
  padding: 30px;
  margin: 50px auto;
  width: 400px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
  padding: 10px;
  width: 70%;
}

button {
  padding: 10px;
  margin: 5px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

#resultat {
  margin-top: 20px;
  text-align: left;
}
</style>
</head>

<body>

<div class="container">
<h1>SENTOX PRO</h1>

<input id="input" placeholder="Produit">
<br><br>

<button onclick="analyser()">Analyser</button>
<button onclick="genererPDF()">PDF</button>

<div id="resultat"></div>
</div>

<script>

let lastData = null;

// Analyse
async function analyser() {
  const nom = document.getElementById("input").value;

  const res = await fetch("/analyser", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ nom })
  });

  const data = await res.json();
  lastData = data;

  document.getElementById("resultat").innerHTML = `
    <p><b>Produit:</b> ${data.nom}</p>
    <p><b>Type:</b> ${data.type}</p>
    <p><b>Risque:</b> ${data.risque}</p>
    <p><b>Effets:</b> ${data.effets}</p>
    <p><b>Conduite:</b> ${data.conduite}</p>
    <p><b>Source:</b> ${data.source}</p>
  `;
}

// PDF
async function genererPDF() {
  if (!lastData) {
    alert("Fais une analyse d'abord");
    return;
  }

  const res = await fetch("/pdf", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(lastData)
  });

  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "rapport_sentox.pdf";
  a.click();
}

</script>

</body>
</html>
